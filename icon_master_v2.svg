<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0f2060"/>
    <stop offset="100%" stop-color="#1a56db"/>
  </linearGradient>
  <linearGradient id="wh" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#cce0ff"/>
  </linearGradient>
  <linearGradient id="purpleG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e879f9"/>
    <stop offset="100%" stop-color="#9333ea"/>
  </linearGradient>
  <linearGradient id="greenG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6ee7b7"/>
    <stop offset="100%" stop-color="#10b981"/>
  </linearGradient>
  <filter id="sh">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
  </filter>
  <filter id="purpleAura">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feFlood flood-color="#a855f7" flood-opacity="0.9" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="greenAura">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feFlood flood-color="#10b981" flood-opacity="0.9" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="robotAura">
    <feGaussianBlur stdDeviation="16" result="blur"/>
    <feFlood flood-color="#a855f7" flood-opacity="0.75" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="flagclip">
    <rect x="32" y="290" width="448" height="192" rx="10"/>
  </clipPath>
</defs>

<!-- Background -->
<rect width="512" height="512" rx="96" fill="url(#bg)"/>

<!-- FLAG -->
<g clip-path="url(#flagclip)">
  <rect x="32" y="290" width="448" height="192" fill="#b91c1c"/>
  <rect x="32" y="304" width="448" height="14" fill="white" opacity="0.92"/>
  <rect x="32" y="332" width="448" height="14" fill="white" opacity="0.92"/>
  <rect x="32" y="360" width="448" height="14" fill="white" opacity="0.92"/>
  <rect x="32" y="388" width="448" height="14" fill="white" opacity="0.92"/>
  <rect x="32" y="416" width="448" height="14" fill="white" opacity="0.92"/>
  <rect x="32" y="444" width="448" height="14" fill="white" opacity="0.92"/>
  <rect x="32" y="468" width="448" height="14" fill="white" opacity="0.92"/>
</g>
<rect x="32" y="290" width="190" height="100" rx="5" fill="#1e3a8a"/>
<g fill="white" font-size="12" font-family="serif">
  <text x="40" y="310">★ ★ ★ ★ ★</text>
  <text x="47" y="326">★ ★ ★ ★ ★</text>
  <text x="40" y="342">★ ★ ★ ★ ★</text>
  <text x="47" y="358">★ ★ ★ ★ ★</text>
  <text x="40" y="374">★ ★ ★ ★ ★</text>
  <text x="47" y="384">★ ★ ★ ★ ★</text>
</g>
<line x1="32" y1="290" x2="480" y2="290" stroke="white" stroke-width="2" opacity="0.3"/>

<!-- ===== H2BAPPLY — UMA LINHA, fonte Impact/Arial Black =====
     Usando text x posicionado manualmente para ficar tudo junto e centralizado
     Baseline y=222
     H  ~68px wide @font-size 110
     2  ~44px wide @font-size 72  (superscript-ish, y=200)
     B  ~82px wide @font-size 130 (destacado roxo)
     A  ~82px wide @font-size 130 (destacado verde)
     P  ~62px wide @font-size 100
     P  ~62px wide @font-size 100
     L  ~52px wide @font-size 100
     Y  ~58px wide @font-size 100
     Total ~512 → centralizar offset x=0
-->

<!-- H -->
<text x="14" y="222"
  font-family="Impact, Arial Black, sans-serif"
  font-size="110" font-weight="900"
  fill="white" filter="url(#sh)">H</text>

<!-- 2 (superscript menor) -->
<text x="82" y="196"
  font-family="Impact, Arial Black, sans-serif"
  font-size="68" font-weight="900"
  fill="white" filter="url(#sh)">2</text>

<!-- B — ROXO destaque, maior, sem espaço -->
<text x="126" y="228"
  font-family="Impact, Arial Black, sans-serif"
  font-size="130" font-weight="900"
  fill="url(#purpleG)"
  filter="url(#purpleAura)">B</text>

<!-- A — VERDE destaque, maior, colado no B -->
<text x="210" y="228"
  font-family="Impact, Arial Black, sans-serif"
  font-size="130" font-weight="900"
  fill="url(#greenG)"
  filter="url(#greenAura)">A</text>

<!-- PPLY — branco, menor, colado no A -->
<text x="300" y="222"
  font-family="Impact, Arial Black, sans-serif"
  font-size="100" font-weight="900"
  fill="white" filter="url(#sh)">PPLY</text>

<!-- Linha separadora sutil -->
<line x1="50" y1="242" x2="462" y2="242" stroke="white" stroke-width="1.5" opacity="0.2"/>

<!-- ===== ROBÔ com AURA ROXA na bandeira ===== -->
<g transform="translate(256,372)" filter="url(#robotAura)">

  <!-- ANTENA — lado DIREITO, bem acima da cabeça mas fora da área do texto -->
  <line x1="20" y1="-88" x2="36" y2="-114" stroke="white" stroke-width="3"/>
  <circle cx="36" cy="-119" r="8" fill="white" opacity="0.95"/>
  <circle cx="36" cy="-119" r="4" fill="#a855f7"/>

  <!-- HEAD -->
  <rect x="-40" y="-88" width="80" height="56" rx="12" fill="white" opacity="0.97"/>
  <!-- Visor -->
  <rect x="-32" y="-78" width="64" height="22" rx="6" fill="#1e3a8a"/>
  <!-- Left eye -->
  <rect x="-28" y="-75" width="24" height="15" rx="4" fill="#a855f7"/>
  <rect x="-24" y="-72" width="9" height="9" rx="2" fill="white" opacity="0.5"/>
  <!-- Right eye -->
  <rect x="4"   y="-75" width="24" height="15" rx="4" fill="#a855f7"/>
  <rect x="8"   y="-72" width="9"  height="9"  rx="2" fill="white" opacity="0.5"/>
  <!-- Smile -->
  <path d="M-20,-46 Q0,-34 20,-46" fill="none" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="-28" cy="-48" r="4" fill="#ef4444" opacity="0.65"/>
  <circle cx="28"  cy="-48" r="4" fill="#ef4444" opacity="0.65"/>
  <!-- Ears -->
  <rect x="-48" y="-76" width="10" height="18" rx="4" fill="white" opacity="0.8"/>
  <rect x="38"  y="-76" width="10" height="18" rx="4" fill="white" opacity="0.8"/>

  <!-- NECK -->
  <rect x="-11" y="-32" width="22" height="11" rx="4" fill="white" opacity="0.7"/>

  <!-- BODY -->
  <rect x="-50" y="-20" width="100" height="66" rx="13" fill="white" opacity="0.94"/>
  <rect x="-36" y="-8"  width="72"  height="44" rx="8"  fill="#1e3a8a" opacity="0.9"/>
  <!-- Left screen purple -->
  <rect x="-32" y="-4" width="30" height="17" rx="4" fill="#9333ea"/>
  <rect x="-28" y="-2" width="11" height="6"  rx="2" fill="white" opacity="0.4"/>
  <!-- Right screen green -->
  <rect x="2"   y="-4" width="30" height="17" rx="4" fill="#10b981" opacity="0.9"/>
  <circle cx="17" cy="4" r="5" fill="white" opacity="0.3"/>
  <circle cx="17" cy="4" r="3" fill="white" opacity="0.6"/>
  <!-- Buttons -->
  <circle cx="-22" cy="24" r="5" fill="#a855f7"/>
  <circle cx="-7"  cy="24" r="5" fill="#60a5fa"/>
  <circle cx="8"   cy="24" r="5" fill="#10b981"/>
  <circle cx="22"  cy="24" r="5" fill="#60a5fa"/>

  <!-- LEFT ARM -->
  <rect x="-72" y="-18" width="20" height="50" rx="8" fill="white" opacity="0.88"/>
  <rect x="-70" y="20"  width="16" height="10" rx="3" fill="#1e3a8a" opacity="0.6"/>
  <rect x="-74" y="34"  width="24" height="13" rx="5" fill="white" opacity="0.8"/>

  <!-- RIGHT ARM -->
  <rect x="52"  y="-18" width="20" height="50" rx="8" fill="white" opacity="0.88"/>
  <rect x="54"  y="20"  width="16" height="10" rx="3" fill="#1e3a8a" opacity="0.6"/>
  <rect x="50"  y="34"  width="24" height="13" rx="5" fill="white" opacity="0.8"/>
</g>

<!-- PAPER PLANE top-right -->
<g transform="translate(424,56) rotate(35)" filter="url(#sh)">
  <path d="M0,20 L62,0 L50,20 L62,40 Z" fill="white" opacity="0.95"/>
  <line x1="50" y1="20" x2="0"  y2="20" stroke="#1e3a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="-4"  y1="13" x2="-26" y2="13" stroke="white" stroke-width="3"   opacity="0.75"/>
  <line x1="-6"  y1="20" x2="-38" y2="20" stroke="white" stroke-width="2.5" opacity="0.55"/>
  <line x1="-4"  y1="28" x2="-22" y2="28" stroke="white" stroke-width="2"   opacity="0.40"/>
</g>

</svg>
